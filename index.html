<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchWhisper - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .canvas-container { touch-action: none; border-radius: 2rem; background-color: #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        canvas { touch-action: none; cursor: crosshair; image-rendering: auto; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Importação robusta via ESM para garantir que o createClient esteja disponível
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const { useState, useEffect, useRef, useMemo } = React;

        // ========================================================
        // 🔑 CONFIGURAÇÃO DO SUPABASE
        // ========================================================
        // Substitua os valores abaixo pelos dados do seu Dashboard do Supabase
        const SUPABASE_URL = "https://dvwbogwvptfejuqyvzki.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_9wMP67tYs-NJSeeYrnLGWw_BUhQFvRo";

        // Validação de segurança para o browser não crashar se as chaves forem inválidas
        const isConfigured = SUPABASE_URL && SUPABASE_URL.startsWith('https://') && SUPABASE_URL.includes('supabase');

        let supabase = null;
        if (isConfigured) {
            try {
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.error("Erro ao inicializar Supabase:", e);
            }
        }

        const AVATARS = ["🐱", "🐶", "🦊", "🐸", "🤖", "🦄", "🐼", "🐯", "🐵", "🦁", "🐧", "🐷"];

        // --- COMPONENTE DE ÍCONE ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconNode, setIconNode] = useState(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    setIconNode(window.lucide.icons[name]);
                }
            }, [name]);
            if (!iconNode) return <span style={{ width: size, height: size, display: 'inline-block' }}></span>;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconNode.reduce((acc, [tag, attrs]) => acc + `<${tag} ${Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ')} />`, '') }}
                />
            );
        };

        const AvatarDisplay = ({ avatar, className = "w-12 h-12" }) => {
            const isImage = avatar && avatar.startsWith('data:image');
            return (
                <div className={`${className} rounded-2xl border-2 border-slate-700 flex items-center justify-center overflow-hidden bg-slate-800 shadow-inner group-hover:border-sky-500 transition-colors`}>
                    {isImage ? <img src={avatar} alt="Avatar" className="w-full h-full object-cover" /> : <span className="text-2xl">{avatar || "❓"}</span>}
                </div>
            );
        };

        // --- COMPONENTE CANVAS ---
        const DrawingCanvas = ({ onSave, initialData }) => {
            const canvasRef = useRef(null);
            const ctxRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [color, setColor] = useState('#38bdf8');
            const [lineWidth, setLineWidth] = useState(5);
            const [tool, setTool] = useState('pencil');

            useEffect(() => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctxRef.current = ctx;

                if (initialData) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
                    img.src = initialData;
                }
            }, []);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                const { x, y } = getPos(e);
                ctxRef.current.lineWidth = tool === 'eraser' ? lineWidth * 3 : lineWidth;
                ctxRef.current.strokeStyle = tool === 'eraser' ? '#1e293b' : color;
                ctxRef.current.beginPath();
                ctxRef.current.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const { x, y } = getPos(e);
                ctxRef.current.lineTo(x, y);
                ctxRef.current.stroke();
            };

            return (
                <div className="flex flex-col gap-4 w-full max-w-2xl mx-auto animate-fade-in text-center">
                    <div className="flex items-center justify-between bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl">
                        <div className="flex gap-2">
                            <button onClick={() => setTool('pencil')} className={`p-3 rounded-xl transition ${tool === 'pencil' ? 'bg-sky-500 text-white' : 'bg-slate-700 text-slate-400'}`}><Icon name="Pencil" /></button>
                            <button onClick={() => setTool('eraser')} className={`p-3 rounded-xl transition ${tool === 'eraser' ? 'bg-sky-500 text-white' : 'bg-slate-700 text-slate-400'}`}><Icon name="Eraser" /></button>
                            <button onClick={() => {
                                const canvas = canvasRef.current;
                                ctxRef.current.clearRect(0, 0, canvas.width, canvas.height);
                            }} className="p-3 rounded-xl bg-slate-700 text-red-400 hover:bg-red-500/20 transition"><Icon name="Trash2" /></button>
                        </div>
                        <div className="flex items-center gap-4">
                            <input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-10 h-10 rounded-lg bg-transparent border-none cursor-pointer" />
                            <input type="range" min="1" max="40" value={lineWidth} onChange={e => setLineWidth(e.target.value)} className="w-24 accent-sky-500" />
                        </div>
                    </div>
                    <div className="canvas-container aspect-video w-full border-2 border-slate-700 overflow-hidden">
                        <canvas ref={canvasRef} onMouseDown={start} onMouseMove={draw} onMouseUp={() => setIsDrawing(false)} onTouchStart={start} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)} className="w-full h-full" />
                    </div>
                    <button onClick={() => onSave(canvasRef.current.toDataURL())} className="w-full py-5 bg-gradient-to-r from-sky-500 to-blue-600 text-white font-black rounded-2xl shadow-xl uppercase active:scale-95 transition-all text-lg tracking-widest">Enviar Desenho</button>
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        function App() {
            if (!isConfigured) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-white">
                        <div className="max-w-md w-full bg-slate-900 border-2 border-amber-500/50 p-10 rounded-[3rem] shadow-2xl text-center space-y-6">
                            <div className="w-20 h-20 bg-amber-500/10 rounded-3xl flex items-center justify-center mx-auto">
                                <Icon name="Database" size={40} className="text-amber-500" />
                            </div>
                            <h2 className="text-2xl font-black italic tracking-tighter uppercase">Configuração Necessária</h2>
                            <p className="text-slate-400 text-sm leading-relaxed">
                                Para o multiplayer funcionar, precisas de ligar o teu projeto ao Supabase.
                            </p>
                            <div className="bg-slate-950 p-6 rounded-2xl text-left font-mono text-[11px] text-sky-400 space-y-3">
                                <p>1. Acede a: <a href="https://supabase.com" className="underline" target="_blank">supabase.com</a></p>
                                <p>2. No teu projeto, vai a <b>Settings &rarr; API</b>.</p>
                                <p>3. Copia o <b>Project URL</b> e a <b>Anon Key</b>.</p>
                                <p>4. Cola-os nas constantes SUPABASE_URL e SUPABASE_ANON_KEY no topo do script!</p>
                            </div>
                        </div>
                    </div>
                );
            }

            const [myId] = useState(() => {
                const existing = localStorage.getItem('sw_uid');
                if (existing) return existing;
                const newId = Math.random().toString(36).substr(2, 9);
                localStorage.setItem('sw_uid', newId);
                return newId;
            });

            const [room, setRoom] = useState(null);
            const [roomId, setRoomId] = useState('');
            const [userName, setUserName] = useState(localStorage.getItem('sw_name') || '');
            const [userAvatar, setUserAvatar] = useState(localStorage.getItem('sw_avatar') || AVATARS[0]);
            const [profileReady, setProfileReady] = useState(!!localStorage.getItem('sw_name'));
            const [isReady, setIsReady] = useState(false);
            const [targetData, setTargetData] = useState(null);
            const [copyFeedback, setCopyFeedback] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (!roomId || !profileReady || !supabase) return;

                const channel = supabase
                    .channel(`room_${roomId}`)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, (payload) => {
                        handleRoomUpdate(payload.new);
                    })
                    .subscribe();

                supabase.from('rooms').select('*').eq('id', roomId).single().then(({ data }) => {
                    if (data) handleRoomUpdate(data);
                });

                return () => { supabase.removeChannel(channel); };
            }, [roomId, profileReady]);

            const handleRoomUpdate = (data) => {
                setRoom(data);
                const pIdx = data.players.findIndex(p => p.id === myId);
                const total = data.players.length;
                
                if (data.status !== 'lobby' && data.status !== 'results') {
                    // Lógica da Corrente: quem está com qual história?
                    const currentChainStarterIdx = (pIdx - data.current_round + total) % total;
                    const starterId = data.players[currentChainStarterIdx].id;
                    
                    if (data.current_round > 0) {
                        const chainContent = data.history[starterId] || [];
                        setTargetData(chainContent[data.current_round - 1]);
                    }
                    
                    setIsReady((data.history[starterId]?.length || 0) > data.current_round);
                }
            };

            const createRoom = async () => {
                const id = Math.random().toString(36).substring(2, 7).toUpperCase();
                const { error } = await supabase.from('rooms').insert([{
                    id,
                    status: 'lobby',
                    players: [{ id: myId, name: userName, avatar: userAvatar, isHost: true }],
                    current_round: 0,
                    history: {}
                }]);
                if (!error) setRoomId(id);
            };

            const joinRoom = async () => {
                const cleanId = roomId.trim().toUpperCase();
                const { data } = await supabase.from('rooms').select('*').eq('id', cleanId).single();
                if (data && data.status === 'lobby') {
                    const playersList = [...data.players];
                    if (!playersList.find(p => p.id === myId)) {
                        playersList.push({ id: myId, name: userName, avatar: userAvatar, isHost: false });
                        await supabase.from('rooms').update({ players: playersList }).eq('id', cleanId);
                    }
                    setRoomId(cleanId);
                }
            };

            const submitTurn = async (content) => {
                if (isReady || !supabase) return;
                
                const { data } = await supabase.from('rooms').select('*').eq('id', roomId).single();
                const pIdx = data.players.findIndex(p => p.id === myId);
                const total = data.players.length;
                const starterIdx = (pIdx - data.current_round + total) % total;
                const starterId = data.players[starterIdx].id;

                const chainHistory = [...(data.history[starterId] || []), content];
                const updatedHistory = { ...data.history, [starterId]: chainHistory };

                const allDone = data.players.every(p => {
                    const plIdx = data.players.findIndex(pl => pl.id === p.id);
                    const chHeldIdx = (plIdx - data.current_round + total) % total;
                    const stIdOfP = data.players[chHeldIdx].id;
                    const h = stIdOfP === starterId ? chainHistory : (data.history[stIdOfP] || []);
                    return h.length > data.current_round;
                });

                let update = { history: updatedHistory };
                if (allDone) {
                    update.current_round = data.current_round + 1;
                    if (update.current_round >= data.players.length) {
                        update.status = 'results';
                    } else {
                        update.status = (data.status === 'write' || data.status === 'describe') ? 'draw' : 'describe';
                    }
                }

                await supabase.from('rooms').update(update).eq('id', roomId);
                setIsReady(true);
            };

            const copyCode = () => {
                const el = document.createElement('textarea');
                el.value = roomId;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyFeedback(true);
                setTimeout(() => setCopyFeedback(false), 2000);
            };

            if (!profileReady) return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                    <div className="max-w-md w-full bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center space-y-8">
                        <h2 className="text-3xl font-black italic uppercase tracking-tighter">Quem és tu?</h2>
                        <div className="flex flex-col items-center gap-6">
                            <div className="relative group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                                <AvatarDisplay avatar={userAvatar} className="w-28 h-28 border-4 border-slate-700 shadow-2xl" />
                                <div className="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Camera" className="text-white" /></div>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={e => {
                                    const file = e.target.files[0];
                                    if (file && file.size < 300000) {
                                        const r = new FileReader();
                                        r.onload = ev => setUserAvatar(ev.target.result);
                                        r.readAsDataURL(file);
                                    }
                                }} />
                            </div>
                            <div className="flex flex-wrap justify-center gap-2">
                                {AVATARS.map(av => <button key={av} onClick={() => setUserAvatar(av)} className={`w-10 h-10 rounded-xl transition-all ${userAvatar === av ? 'bg-sky-500 scale-110 shadow-lg shadow-sky-500/20' : 'bg-slate-800 hover:bg-slate-700'}`}>{av}</button>)}
                            </div>
                            <input type="text" maxLength={12} placeholder="Teu Apelido" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl px-6 py-4 outline-none focus:border-sky-500 font-bold text-center text-lg shadow-inner" />
                            <button onClick={() => { if(userName.trim()){ localStorage.setItem('sw_name', userName); localStorage.setItem('sw_avatar', userAvatar); setProfileReady(true); } }} className="w-full py-5 bg-sky-500 text-white font-black rounded-2xl shadow-xl uppercase active:scale-95 transition tracking-widest hover:bg-sky-400">Confirmar</button>
                        </div>
                    </div>
                </div>
            );

            if (!room) return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                    <div className="max-w-md w-full bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl space-y-8">
                        <div className="flex items-center gap-4 bg-slate-800/40 p-5 rounded-[2rem] border border-slate-700/50">
                            <AvatarDisplay avatar={userAvatar} className="w-14 h-14" />
                            <div className="flex-1">
                                <p className="text-slate-500 text-[8px] font-black uppercase tracking-widest">JOGADOR</p>
                                <p className="font-black text-sky-400 text-xl truncate uppercase">{userName}</p>
                            </div>
                            <button onClick={() => setProfileReady(false)} className="p-2 text-slate-600 hover:text-sky-500 transition"><Icon name="Settings" size={18} /></button>
                        </div>
                        <div className="space-y-4">
                            <button onClick={createRoom} className="w-full py-6 bg-sky-500 text-white font-black rounded-[2rem] shadow-xl flex items-center justify-center gap-3 uppercase italic text-2xl active:scale-95 transition-all hover:bg-sky-400"><Icon name="PlusCircle" size={28} /> Criar Sala</button>
                            <div className="relative py-2 flex items-center gap-4"><div className="h-px flex-1 bg-slate-800"></div><span className="text-slate-600 text-[10px] font-black uppercase tracking-widest">OU</span><div className="h-px flex-1 bg-slate-800"></div></div>
                            <div className="space-y-3">
                                <input type="text" placeholder="CÓDIGO" value={roomId} onChange={e => setRoomId(e.target.value.toUpperCase())} className="w-full bg-slate-800 border-2 border-slate-700 rounded-3xl px-6 py-5 text-center text-3xl font-mono text-white outline-none focus:border-sky-500 shadow-inner" />
                                <button onClick={joinRoom} disabled={!roomId} className="w-full py-5 bg-slate-700 text-white font-black rounded-3xl uppercase hover:bg-slate-600 transition text-lg">Entrar</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="container mx-auto px-4 pt-10 pb-32 max-w-5xl">
                    <header className="flex flex-col items-center mb-16 animate-fade-in">
                        <div className="flex items-center gap-4 mb-2">
                            <div className="p-4 bg-sky-500 rounded-3xl shadow-2xl transform -rotate-3"><Icon name="Palette" size={32} /></div>
                            <h1 className="text-5xl font-black italic tracking-tighter uppercase">Sketch<span className="text-sky-500 underline decoration-8 underline-offset-8">Whisper</span></h1>
                        </div>
                    </header>

                    {room.status === 'lobby' && (
                        <div className="space-y-10 animate-fade-in">
                            <div className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 flex flex-col md:flex-row justify-between items-center shadow-2xl gap-6">
                                <div className="flex flex-col items-center md:items-start text-center">
                                    <span className="text-slate-500 text-[10px] font-black uppercase mb-1 tracking-widest">CÓDIGO DA SALA</span>
                                    <div onClick={copyCode} className="flex items-center gap-3 cursor-pointer group">
                                        <span className="text-5xl font-mono font-black text-sky-400 tracking-tighter">{room.id}</span>
                                        <div className="p-2 bg-slate-800 rounded-xl group-hover:bg-sky-500 transition shadow-lg"><Icon name={copyFeedback ? "CheckCircle" : "Copy"} size={18} /></div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-800 px-8 py-4 rounded-[2rem] border border-slate-700 shadow-xl">
                                    <Icon name="Users" size={24} className="text-sky-400" />
                                    <div className="flex flex-col"><span className="font-black text-2xl leading-none">{room.players.length}</span><span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">PLAYERS</span></div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-6">
                                {room.players.map(p => (
                                    <div key={p.id} className={`p-8 rounded-[2.5rem] border-2 flex flex-col items-center gap-4 transition-all hover:scale-105 ${p.id === myId ? 'border-sky-500 bg-sky-500/10 shadow-2xl' : 'border-slate-800 bg-slate-900 shadow-xl'}`}>
                                        <AvatarDisplay avatar={p.avatar} className="w-24 h-24 shadow-2xl" />
                                        <span className="text-xs font-black uppercase text-center tracking-tight">{p.name} {p.isHost && "⭐"}</span>
                                    </div>
                                ))}
                            </div>
                            {room.players.find(p => p.id === myId)?.isHost ? (
                                <button onClick={() => supabase.from('rooms').update({ status: 'write' }).eq('id', roomId)} disabled={room.players.length < 2} className="w-full py-8 bg-green-500 text-white font-black rounded-[2.5rem] text-3xl hover:bg-green-400 transition-all shadow-2xl uppercase italic active:scale-95 disabled:opacity-50">Iniciar Partida</button>
                            ) : (
                                <div className="p-12 bg-slate-900/50 rounded-[3rem] text-center text-slate-500 font-bold italic border-4 border-dashed border-slate-800 uppercase text-xs tracking-widest">Aguardando o mestre começar...</div>
                            )}
                        </div>
                    )}

                    {room.status === 'write' && (
                        <div className="max-w-xl mx-auto text-center space-y-10 py-10 animate-fade-in">
                            <Icon name="Type" size={64} className="text-sky-500 mx-auto" />
                            <h2 className="text-4xl font-black italic uppercase tracking-tighter">O que vamos desenhar?</h2>
                            {!isReady ? (
                                <div className="flex flex-col gap-5">
                                    <input type="text" autoFocus onChange={e => setCurrentInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && currentInput.trim() && submitTurn(currentInput)} placeholder="Ex: Um gato com chapéu espacial..." className="w-full bg-slate-800 border-2 border-slate-700 rounded-[2rem] px-8 py-7 text-2xl text-white outline-none focus:border-sky-500 shadow-2xl text-center shadow-inner" />
                                    <button onClick={() => currentInput.trim() && submitTurn(currentInput)} className="bg-sky-500 py-6 rounded-[2rem] text-white font-black text-2xl uppercase shadow-xl active:scale-95 transition-all hover:bg-sky-400">Estou Pronto!</button>
                                </div>
                            ) : <div className="p-20 bg-slate-900 rounded-[4rem] border-4 border-dashed border-slate-800 animate-pulse text-slate-600 font-black uppercase italic tracking-widest text-xl">Sua frase foi enviada! Aguardando...</div>}
                        </div>
                    )}

                    {room.status === 'draw' && (
                        <div className="space-y-10 animate-fade-in text-center">
                            {!isReady ? (
                                <div className="space-y-6">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tighter">Desenha: <span className="text-sky-400">"{targetData}"</span></h2>
                                    <DrawingCanvas onSave={submitTurn} />
                                </div>
                            ) : <div className="p-32 text-center text-slate-500 font-black uppercase animate-pulse italic text-2xl tracking-widest">Arte enviada!</div>}
                        </div>
                    )}

                    {room.status === 'describe' && (
                        <div className="max-w-2xl mx-auto space-y-10 animate-fade-in">
                            <h2 className="text-4xl font-black text-center uppercase italic tracking-tighter">O que vês aqui?</h2>
                            {!isReady ? (
                                <div className="flex flex-col gap-8 text-center">
                                    <div className="aspect-video bg-white rounded-[3rem] p-8 shadow-2xl border-8 border-slate-900"><img src={targetData} className="w-full h-full object-contain pointer-events-none" /></div>
                                    <input type="text" autoFocus onChange={e => setCurrentInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && currentInput.trim() && submitTurn(currentInput)} placeholder="Teu palpite..." className="w-full bg-slate-800 border-2 border-slate-700 rounded-[2.5rem] px-8 py-7 text-3xl text-center outline-none focus:border-sky-500 shadow-xl font-bold" />
                                    <button onClick={() => currentInput.trim() && submitTurn(currentInput)} className="bg-sky-500 py-6 rounded-[2.5rem] text-white font-black text-2xl uppercase shadow-xl active:scale-95 transition-all hover:bg-sky-400">Enviar Palpite</button>
                                </div>
                            ) : <div className="p-32 text-center text-slate-700 font-black uppercase animate-pulse italic text-2xl tracking-widest">Palpite Registado!</div>}
                        </div>
                    )}

                    {room.status === 'results' && (
                        <div className="max-w-4xl mx-auto space-y-32 py-10 animate-fade-in">
                            <h2 className="text-7xl font-black text-center text-transparent bg-clip-text bg-gradient-to-br from-sky-400 via-blue-500 to-purple-600 uppercase italic tracking-tighter">Álbum Final</h2>
                            {room.players.map((op, pIdx) => (
                                <section key={op.id} className="relative p-12 bg-slate-900/40 rounded-[5rem] border border-slate-800 shadow-2xl backdrop-blur-md text-center">
                                    <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-800 px-10 py-3 rounded-full border-2 border-slate-700 font-black text-sky-400 shadow-2xl flex items-center gap-4 text-xl italic whitespace-nowrap">
                                        <AvatarDisplay avatar={op.avatar} className="w-10 h-10" /> Corrente de {op.name}
                                    </div>
                                    <div className="space-y-20 pt-16">
                                        {room.players.map((_, sIdx) => {
                                            const authorIdx = (pIdx + sIdx) % room.players.length;
                                            const author = room.players[authorIdx];
                                            const content = room.history[op.id]?.[sIdx];
                                            if (!content) return null;
                                            const isImg = content.startsWith('data:image');
                                            return (
                                                <div key={sIdx} className="flex flex-col items-center gap-8 group">
                                                    <div className="flex items-center gap-4 bg-slate-800/80 px-6 py-3 rounded-full text-xs font-black uppercase text-slate-500 border border-slate-700 shadow-xl group-hover:text-sky-400 transition-colors">
                                                        <AvatarDisplay avatar={author.avatar} className="w-8 h-8" /> 
                                                        <span>{author.name} {sIdx === 0 ? 'começou com:' : isImg ? 'desenhou:' : 'adivinhou:'}</span>
                                                    </div>
                                                    {isImg ? (
                                                        <div className="w-full p-8 bg-white rounded-[4rem] shadow-2xl transition-all group-hover:rotate-1 group-hover:scale-[1.03]"><img src={content} className="w-full rounded-3xl" /></div>
                                                    ) : (
                                                        <div className="w-full p-16 bg-slate-800 rounded-[4rem] text-center shadow-2xl border border-slate-700 group-hover:scale-[1.03] transition-all"><p className="text-5xl font-black italic leading-tight tracking-tight">"{content}"</p></div>
                                                    )}
                                                    {sIdx < room.players.length - 1 && <Icon name="ChevronDown" size={48} className="text-slate-800 mt-4 animate-bounce" />}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            ))}
                            <button onClick={() => window.location.reload()} className="w-full py-10 bg-sky-500 text-white font-black rounded-[3rem] text-4xl uppercase italic hover:bg-sky-400 transition-all shadow-2xl active:scale-95 tracking-widest shadow-sky-500/20">Jogar Novamente</button>
                        </div>
                    )}

                    {/* RODAPÉ DE STATUS */}
                    {room && (
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/90 backdrop-blur-2xl border-t border-slate-800 flex justify-between items-center z-50">
                            <div className="flex items-center gap-12 text-[10px] font-black text-slate-600 uppercase tracking-widest">
                                <div className="flex flex-col"><span className="text-slate-700 mb-1">SALA</span><span className="text-sky-400 text-base font-mono leading-none tracking-tighter">{room.id}</span></div>
                                <div className="flex flex-col"><span className="text-slate-700 mb-1">RODADA</span><span className="text-sky-400 text-base leading-none tracking-tighter">{room.status === 'results' ? 'FIM' : `${room.current_round + 1}/${room.players.length}`}</span></div>
                            </div>
                            <div className="flex -space-x-4">
                                {room.players.map(p => {
                                    const plIdx = room.players.findIndex(pl => pl.id === p.id);
                                    const chHeldIdx = (plIdx - room.current_round + room.players.length) % room.players.length;
                                    const stId = room.players[chHeldIdx].id;
                                    const done = (room.history[stId]?.length || 0) > room.current_round;
                                    return (
                                        <div key={p.id} title={p.name} className={`w-12 h-12 rounded-full border-4 border-slate-950 transition-all ${ done ? 'border-green-500 scale-110 z-10 shadow-lg shadow-green-500/30' : 'border-slate-800 grayscale opacity-30 scale-90'}`}>
                                            <AvatarDisplay avatar={p.avatar} className="w-full h-full" />
                                        </div>
                                    );
                                })}
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
